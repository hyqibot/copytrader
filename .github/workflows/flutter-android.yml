name: Flutter Android
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate Android platform (avoid stale AGP)
        run: |
          rm -rf android ios linux macos windows web
          flutter create . --project-name gendan_shenkong --org com.hyqibot.gendan --platforms=android

      - name: Allow HTTP LAN Relay (INTERNET + cleartext)
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF
          python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          text = p.read_text(encoding="utf-8")
          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">",
                  "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n"
                  "    <uses-permission android:name=\"android.permission.INTERNET\" />",
                  1,
              )
          if "POST_NOTIFICATIONS" not in text:
              text = text.replace(
                  "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">",
                  "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n"
                  "    <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />",
                  1,
              )
          if "usesCleartextTraffic" not in text:
              text = text.replace(
                  "<application",
                  '<application android:usesCleartextTraffic="true" '
                  'android:networkSecurityConfig="@xml/network_security_config"',
                  1,
              )
          # App display name
          text = text.replace('android:label="gendan_shenkong"', 'android:label="跟单神控"')
          p.write_text(text, encoding="utf-8")
          final = p.read_text(encoding="utf-8")
          assert "INTERNET" in final
          assert "usesCleartextTraffic" in final
          print("patched AndroidManifest OK")
          PY

      - name: Enable core library desugaring (flutter_local_notifications)
        run: |
          python3 <<'PY'
          from pathlib import Path
          candidates = [
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ]
          p = next((c for c in candidates if c.is_file()), None)
          assert p is not None, "android/app/build.gradle(.kts) missing"
          text = p.read_text(encoding="utf-8")
          if p.suffix == ".kts":
              if "isCoreLibraryDesugaringEnabled" not in text:
                  if "compileOptions {" in text:
                      text = text.replace(
                          "compileOptions {",
                          "compileOptions {\n        isCoreLibraryDesugaringEnabled = true",
                          1,
                      )
                  else:
                      raise SystemExit("compileOptions block not found in build.gradle.kts")
              if "coreLibraryDesugaring(" not in text:
                  if "dependencies {" in text:
                      text = text.replace(
                          "dependencies {",
                          'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")',
                          1,
                      )
                  else:
                      text += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
          else:
              if "coreLibraryDesugaringEnabled" not in text:
                  text = text.replace(
                      "compileOptions {",
                      "compileOptions {\n        coreLibraryDesugaringEnabled true",
                      1,
                  )
              if "desugar_jdk_libs" not in text:
                  if "dependencies {" in text:
                      text = text.replace(
                          "dependencies {",
                          "dependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'",
                          1,
                      )
                  else:
                      text += "\n\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n"
          p.write_text(text, encoding="utf-8")
          out = p.read_text(encoding="utf-8")
          assert "desugar" in out.lower()
          print(f"patched {p} for desugaring OK")
          PY

      - run: flutter pub get

      - name: Generate launcher icons from assets/icon.png
        run: dart run flutter_launcher_icons

      - name: Remove default widget test
        run: rm -f test/widget_test.dart

      - name: Analyze
        continue-on-error: true
        run: flutter analyze

      - name: Build release APK
        # 临时直连源站 IP（EdgeOne 误拦期间）。恢复域名后改回 https://gendan.hyqibot.com
        # 若仓库 Variables 仍有旧值会覆盖 fallback，请同步改 Variables。
        run: flutter build apk --release --dart-define=GENDAN_PUBLIC_URL=${{ vars.GENDAN_PUBLIC_URL || '[REDACTED]' }}

      - uses: actions/upload-artifact@v4
        with:
          name: gendan-shenkong-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
